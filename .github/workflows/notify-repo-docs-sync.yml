# Copy this file to .github/workflows/notify-repo-docs-sync.yml in any repo
# to trigger Open Brain doc sync on push to main.
# Requires: REPO_SYNC_TOKEN secret (PAT with repo scope) set at org level.

name: Notify Open Brain

on:
  push:
    branches: [main]
    paths:
      - "decisions/**"
      - "discussions/**"
      - "docs/**"
      - "_context/**"
      - "sql/**"
      - "temporal/**"
      - "tools/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger repo docs sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.REPO_SYNC_TOKEN }}" \
            https://api.github.com/repos/tklrstudio/open-brain/dispatches \
            -d '{"event_type": "repo-docs-sync", "client_payload": {"repo": "${{ github.event.repository.name }}"}}'
